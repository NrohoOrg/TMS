name: CI
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4

  lint-typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: pnpm install --frozen-lockfile
      - run: pip install -r apps/optimizer/requirements.txt
      - uses: nrwl/nx-set-shas@v4
      - run: pnpm nx affected -t lint typecheck --parallel=3

  unit-tests:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: pnpm install --frozen-lockfile
      - run: pip install -r apps/optimizer/requirements.txt
      - uses: nrwl/nx-set-shas@v4
      - run: pnpm nx affected -t test --parallel=3

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: dispatch
          POSTGRES_PASSWORD: dispatch
          POSTGRES_DB: dispatch_test
        options: >-
          --health-cmd "pg_isready -U dispatch -d dispatch_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://dispatch:dispatch@localhost:5432/dispatch_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_test_secret
      NODE_ENV: test
      OPTIMIZER_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api prisma migrate deploy
      - run: pnpm --filter api prisma generate
      - run: pnpm --filter api prisma:seed
      - run: pip install -r apps/optimizer/requirements.txt
      - name: Start Python optimizer in background
        run: |
          cd apps/optimizer
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > optimizer.log 2>&1 &
          echo $! > optimizer.pid
      - name: Wait for optimizer to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs > /dev/null; then
              echo "Optimizer is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Optimizer did not start in time"
          cat apps/optimizer/optimizer.log
          exit 1
      - run: pnpm nx run api:test:e2e
      - if: always()
        name: Show optimizer log on failure
        run: |
          echo "=== optimizer.log (tail) ==="
          tail -200 apps/optimizer/optimizer.log || true
          if [ -f apps/optimizer/optimizer.pid ]; then
            kill $(cat apps/optimizer/optimizer.pid) || true
          fi

  build:
    needs: [lint-typecheck, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - run: pnpm nx affected -t build --parallel=3

