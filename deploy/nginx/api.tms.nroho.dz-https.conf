# API + Optimizer: api.tms.nroho.dz

upstream tms_api_backend {
    least_conn;
    keepalive 32;
    server tms_api:3001 max_fails=3 fail_timeout=30s;
}

upstream tms_optimizer_backend {
    server tms_optimizer:8000 max_fails=3 fail_timeout=30s;
}

# limit_req_zone directives are defined globally in nroho.dz-https.conf and
# apply http-wide, so we reuse them by name (zone=login, zone=api).

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name api.tms.nroho.dz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name api.tms.nroho.dz;

    ssl_certificate     /etc/letsencrypt/live/tms.nroho.dz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tms.nroho.dz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    add_header Access-Control-Allow-Origin "https://tms.nroho.dz" always;
    add_header Access-Control-Allow-Credentials "true" always;

    client_max_body_size 20M;

    # Optimizer service — strip /optimizer prefix before forwarding
    location /optimizer/ {
        rewrite ^/optimizer/(.*)$ /$1 break;
        proxy_pass http://tms_optimizer_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Health endpoint (no rate limit)
    location = /health {
        proxy_pass http://tms_api_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Login endpoints — strict rate limit
    location ~ ^/auth/(login|register|refresh|reset-password) {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://tms_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # General API — moderate rate limit
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://tms_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/tms_api_access.log;
    error_log  /var/log/nginx/tms_api_error.log warn;
}
