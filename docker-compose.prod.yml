# Lives in the repo for reference and is also copied to the server during deploy.
# Consumed by the server at /opt/tms/docker-compose.prod.yml.

services:
  tms_postgres:
    image: postgres:16-alpine
    container_name: tms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tms_prod}
    volumes:
      - tms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tms} -d ${POSTGRES_DB:-tms_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tms_internal
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=50

  tms_redis:
    image: redis:7-alpine
    container_name: tms_redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
    volumes:
      - tms_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tms_internal

  tms_api:
    image: ${API_IMAGE}
    container_name: tms_api
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      tms_postgres:
        condition: service_healthy
      tms_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tms_internal
      - server_app_network
    deploy:
      resources:
        limits:
          memory: 512M

  tms_optimizer:
    image: ${OPTIMIZER_IMAGE}
    container_name: tms_optimizer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tms_internal
      - server_app_network
    deploy:
      resources:
        limits:
          memory: 768M

  tms_web:
    image: ${WEB_IMAGE}
    container_name: tms_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      tms_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - server_app_network
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  tms_internal:
    driver: bridge
  server_app_network:
    external: true

volumes:
  tms_postgres_data:
    driver: local
  tms_redis_data:
    driver: local
